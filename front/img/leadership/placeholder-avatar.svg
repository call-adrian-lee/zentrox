<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="Portrait placeholder">
  <defs>
    <linearGradient id="zt-ph-sky" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f6f9ff"/>
      <stop offset="52%" stop-color="#e9f0fb"/>
      <stop offset="100%" stop-color="#dce7f7"/>
    </linearGradient>
    <linearGradient id="zt-ph-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b88c4"/>
      <stop offset="48%" stop-color="#3f69aa"/>
      <stop offset="100%" stop-color="#2f5591"/>
    </linearGradient>
    <radialGradient id="zt-ph-face" cx="42%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#cfddef"/>
      <stop offset="70%" stop-color="#95b3da"/>
      <stop offset="100%" stop-color="#6f96c9"/>
    </radialGradient>
    <linearGradient id="zt-ph-body" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#89acd4"/>
      <stop offset="100%" stop-color="#5f89bd"/>
