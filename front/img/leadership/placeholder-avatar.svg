  <!-- Small brand-aligned accents -->
  <g opacity="0.42" stroke="#3f69aa" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M116 118a46 46 0 015-18"/>
    <circle cx="80" cy="152" r="3" fill="#3f69aa" stroke="none"/>
    <circle cx="92" cy="148" r="2" fill="#3f69aa" stroke="none"/>
    <circle cx="68" cy="148" r="2" fill="#3f69aa" stroke="none"/>
