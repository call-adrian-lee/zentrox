  </defs>

  <rect width="160" height="160" rx="14" ry="14" fill="url(#zt-ph-sky)" stroke="#c8d8ee" stroke-width="1"/>

  <circle cx="80" cy="74" r="46" fill="none" stroke="url(#zt-ph-ring)" stroke-width="2.25" opacity="0.5"/>

  <ellipse cx="80" cy="148" rx="64" ry="54" fill="url(#zt-ph-body)" opacity="0.94"/>

  <circle cx="80" cy="69" r="34" fill="url(#zt-ph-face)"/>

  <!-- Soft forehead highlight -->
  <ellipse cx="71" cy="54" rx="22" ry="14" fill="#ffffff" opacity="0.22"/>

  <!-- Light curve suggesting shoulders -->
