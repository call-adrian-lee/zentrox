<app-hero-carousel></app-hero-carousel>
<app-about-section></app-about-section>
<app-leadership-section></app-leadership-section>
<app-services-section></app-services-section>
<section id="mvp-cta" [attr.aria-label]="'mvp.cta.sectionAria' | t">
  <div class="container">
    <div class="mvp-cta-card section-header">
      <h2>{{ 'mvp.cta.title' | t }}</h2>
      <p class="mvp-cta-description">
        {{ 'mvp.cta.body' | t }}
      </p>
      @if (mvpPublishedCount() > 0) {
        <a
          class="mvp-cta-button"
          routerLink="/mvp"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="'mvp.cta.linkAria' | t"
          >{{ 'mvp.cta.linkLabel' | t }}</a
        >
      } @else {
        <span
          class="mvp-cta-button mvp-cta-button--disabled"
          tabindex="-1"
          aria-disabled="true"
          [attr.aria-label]="
            mvpPublishedCount() < 0 ? ('mvp.cta.loadingAria' | t) : ('mvp.cta.disabledLinkAria' | t)
          "
          >{{ mvpPublishedCount() < 0 ? ('mvp.cta.loadingLabel' | t) : ('mvp.cta.disabledLinkLabel' | t) }}</span
        >
      }
    </div>
  </div>
</section>
<app-counters-section></app-counters-section>
<app-portfolio-section></app-portfolio-section>
<app-clients-section></app-clients-section>
<app-contact-section></app-contact-section>
