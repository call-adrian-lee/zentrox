<section class="zt-admin-login py-5">
  <div class="container zt-admin-login__container">
    <div class="card border-0 shadow-sm zt-admin-login-card">
      <div class="card-body p-4">
        <h1 class="h4 mb-4">{{ 'admin.loginTitle' | t }}</h1>
        <form (ngSubmit)="submit()" [formGroup]="form" novalidate>
          <div class="mb-3">
            <label class="form-label" for="adm-user">{{ 'admin.loginUsername' | t }}</label>
            <input
              id="adm-user"
              type="text"
              class="form-control"
              formControlName="username"
              autocomplete="username"
              spellcheck="false"
            />
          </div>
          <div class="mb-3">
            <label class="form-label" for="adm-pass">{{ 'admin.loginPassword' | t }}</label>
            <input id="adm-pass" type="password" class="form-control" formControlName="password" autocomplete="current-password" />
          </div>
          @if (errorKey()) {
            <p class="text-danger small">{{ errorKey()! | t }}</p>
          }
          <button type="submit" class="btn btn-primary w-100" [disabled]="submitting()">
            {{ submitting() ? '…' : ('admin.loginSubmit' | t) }}
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
