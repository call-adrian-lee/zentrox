<section class="contact" id="contact" aria-labelledby="contact-heading">
  <div class="container">
    <header class="section-header contact-hero">
      <h2 id="contact-heading">{{ 'nav.contact' | t }}</h2>
      <div class="contact-hero__lead">
        <p>{{ 'contact.lead1' | t }}</p>
        <p>{{ 'contact.lead2' | t }}</p>
      </div>
      <div class="contact-hero__meta" role="group" [attr.aria-label]="'contact.chipsAria' | t">
        <span class="contact-hero__chip">{{ 'contact.sla' | t }}</span>
        <span class="contact-hero__chip">{{ 'contact.hours' | t }}</span>
      </div>
    </header>

    <div class="row g-4 g-xl-5 contact-layout justify-content-center">
      <div class="col-lg-8">
        <div class="contact-panel contact-panel--form">
          <div class="contact-panel__head">
            <h3 class="contact-panel__title">{{ 'contact.formTitle' | t }}</h3>
          </div>
          <form
            #contactForm
            id="contact-form"
            class="contact-form"
            action="https://formspree.io/f/xpqkjkyk"
            method="POST"
            (keydown)="contactFormKeydown($event, contactForm)"
            (submit)="submitContact($event, contactForm)"
          >
            <div class="row g-3 mb-0">
              <div class="col-md-6">
                <label class="contact-field__label" for="contact-name">{{ 'contact.name' | t }}</label>
                <input
                  id="contact-name"
                  type="text"
                  class="form-control contact-field__input"
                  name="name"
                  autocomplete="name"
                  required
                />
              </div>
              <div class="col-md-6">
                <label class="contact-field__label" for="contact-email">{{ 'contact.email' | t }}</label>
                <input
                  id="contact-email"
                  type="email"
                  class="form-control contact-field__input"
                  name="email"
                  autocomplete="email"
                  required
                />
              </div>
            </div>
            <div class="contact-field">
              <label class="contact-field__label" for="contact-subject">{{ 'contact.subject' | t }}</label>
              <input
                id="contact-subject"
                type="text"
                class="form-control contact-field__input"
                name="subject"
                required
              />
            </div>
            <div class="contact-field">
              <label class="contact-field__label" for="contact-message">{{ 'contact.message' | t }}</label>
              <textarea
                id="contact-message"
                class="form-control contact-field__input contact-field__input--message"
                rows="5"
                name="message"
                required
              ></textarea>
            </div>
            <input type="hidden" name="_subject" [value]="'contact.formSubject' | t" />
            <input type="text" name="_gotcha" class="d-none" tabindex="-1" autocomplete="off" />
            <div class="contact-form__actions">
              <button
                type="submit"
                class="contact-btn-submit"
                [disabled]="formSubmitting()"
              >
                {{ formSubmitting() ? ('contact.sending' | t) : ('contact.submit' | t) }}
              </button>
            </div>
            <div
              id="contact-form-status"
              class="form-status contact-form__status"
              [class.is-success]="formStatusClass() === 'is-success'"
              [class.is-error]="formStatusClass() === 'is-error'"
              aria-live="polite"
            >
              {{ formStatus() }}
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
