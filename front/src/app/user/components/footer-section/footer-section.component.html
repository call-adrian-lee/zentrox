<footer id="footer">
  <div class="container">
    <div class="row align-items-start footer-main">
      <div class="col-md-6 mb-3 mb-md-0">
        <p class="footer-brand">
          <strong>{{ companyName }}</strong>
        </p>
        <p class="footer-meta mb-2">{{ 'footer.tagline' | t }}</p>
        <nav class="zt-footer-links" [attr.aria-label]="'footer.linksAria' | t">
          <a [href]="getQuotePath" (click)="nav.openSitePageInNewTab($event, getQuotePath)">{{ 'footer.getQuote' | t }}</a>
          <span class="zt-footer-links__sep" aria-hidden="true">·</span>
          <a [href]="openRolesPath" (click)="nav.openSitePageInNewTab($event, openRolesPath)">{{ 'footer.openRoles' | t }}</a>
          <span class="zt-footer-links__sep" aria-hidden="true">·</span>
          <a routerLink="/" fragment="contact">{{ 'footer.contact' | t }}</a>
        </nav>
      </div>
      <div class="col-md-6 text-md-end">
        <p class="footer-note">{{ 'footer.note' | t }}</p>
        <p class="footer-meta footer-copy mb-0">{{ 'footer.copy' | t }}</p>
      </div>
    </div>
    <div class="zt-footer-social">
      <div class="zt-footer-social__inner">
        <a
          class="zt-footer-ico"
          [href]="slackHref"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="'footer.slackAria' | t"
        >
          <svg
            class="zt-footer-ico__svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <path
              fill="currentColor"
              d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 6.323a2.528 2.528 0 0 1-2.521-2.52 2.528 2.528 0 0 1 2.521-2.522 2.528 2.528 0 0 1 2.521 2.521v2.522H8.834V6.323zm0 1.274a2.528 2.528 0 0 1 2.521 2.521 2.528 2.528 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 10.118a2.528 2.528 0 0 1 2.522-2.521h6.312zm9.843 2.521a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 10.118a2.528 2.528 0 0 1-2.522 2.521h-2.518V10.118zm-1.274 0a2.528 2.528 0 0 1-2.521 2.521 2.528 2.528 0 0 1-2.521-2.521V3.806A2.528 2.528 0 0 1 15.165 1.28 2.527 2.527 0 0 1 17.686 3.8v6.318zm-2.522 9.843a2.527 2.527 0 0 1 2.522 2.522 2.528 2.528 0 0 1-2.522 2.522 2.528 2.528 0 0 1-2.521-2.522v-2.522h2.521zm0-1.274a2.528 2.528 0 0 1-2.521-2.523 2.527 2.527 0 0 1 2.521-2.52h6.313A2.528 2.528 0 0 1 24 15.165a2.528 2.528 0 0 1-2.522 2.52h-6.315z"
            />
          </svg>
        </a>
      </div>
    </div>
  </div>
</footer>
