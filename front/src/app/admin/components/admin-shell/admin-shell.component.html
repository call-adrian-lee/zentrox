<div class="zt-admin-shell d-flex min-vh-100">
  <app-admin-notice-stack />
  <div class="zt-admin-shell__body d-flex flex-grow-1">
    @if (showSidebar()) {
      <aside class="zt-admin-shell__aside">
        <a routerLink="/" class="zt-admin-shell__brand text-decoration-none" [attr.aria-label]="'nav.logoAlt' | t">
          <svg
            class="zt-admin-shell__logo"
            xmlns="http://www.w3.org/2000/svg"
            width="280"
            height="56"
            viewBox="0 0 360 72"
            aria-hidden="true"
            focusable="false"
          >
            <g class="zt-logo-mark" transform="translate(6 6)">
              <rect class="zt-logo-mark__badge" x="0" y="0" width="60" height="60" rx="16" />
              <path class="zt-logo-mark__z" d="M18 18h24l-20 24h20v6H18l20-24H18z" />
              <g class="zt-logo-mark__dots">
                <circle cx="44" cy="16" r="2.2" />
                <circle cx="49" cy="22" r="2.2" />
                <circle cx="40" cy="24" r="2.2" />
              </g>
              <g class="zt-logo-mark__lines">
                <path d="M44 16 L49 22" />
                <path d="M40 24 L49 22" />
              </g>
            </g>
            <text x="84" y="46" class="zt-admin-logo-word">Zentrox</text>
          </svg>
        </a>
        <nav class="d-flex flex-column gap-1 p-3" [attr.aria-label]="'admin.sideNavAria' | t">
          @for (group of navGroups; track $index) {
            @for (link of group.links; track link.routerLink) {
              <a
                class="zt-admin-shell__nav-link"
                [routerLink]="link.routerLink"
                routerLinkActive="zt-admin-shell__nav-link--active"
                [routerLinkActiveOptions]="{ exact: true }"
                >{{ link.labelKey | t }}</a
              >
            }
            @if (group.dividerAfter) {
              <hr class="zt-admin-shell__nav-divider my-2" aria-hidden="true" />
            }
          }
          <button type="button" class="btn btn-link btn-sm text-start px-0" (click)="auth.logout()">
            {{ 'admin.logout' | t }}
          </button>
        </nav>
      </aside>
    }
    <main id="main-content" class="zt-admin-shell__main flex-grow-1">
      <router-outlet />
    </main>
  </div>
</div>
