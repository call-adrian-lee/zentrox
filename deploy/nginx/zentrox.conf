# Zentrox production — Nginx reverse proxy + Angular SPA + Node API
#
# Install:
#   sudo cp deploy/nginx/zentrox.conf /etc/nginx/sites-available/zentrox.conf
#   sudo ln -sf /etc/nginx/sites-available/zentrox.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust paths, server_name, and SSL certificate paths for your VPS.

upstream zentrox_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS (enable after certbot)
server {
    listen 80;
    listen [::]:80;
    server_name zentrox.us www.zentrox.us;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zentrox.us www.zentrox.us;

    # Certbot / Let's Encrypt paths — update after issuance
    ssl_certificate     /etc/letsencrypt/live/zentrox.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentrox.us/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ZentroxSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers (supplement Helmet on API)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Angular build output
    root /var/www/zentrox/front/dist/zentrox/browser;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Long cache for hashed JS/CSS from Angular build
    location ~* \.(?:js|css|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static images (repo img/ + admin portfolio uploads)
    location /img/ {
        root /var/www/zentrox/front;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Node API — same origin as SPA
    location /api/ {
        proxy_pass http://zentrox_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 16m;
    }

    # SEO / crawler files from public/
    location = /robots.txt {
        try_files $uri =404;
    }
    location = /sitemap.xml {
        try_files $uri =404;
    }

    # SPA fallback — all other routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: custom 404 page copied by postbuild
    error_page 404 /404.html;
}
